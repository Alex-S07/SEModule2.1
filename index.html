<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SE Module 2 — Study Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#060d1a;color:#e2e8f0;font-family:'DM Sans','Segoe UI',sans-serif;min-height:100vh}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:3px}
  .header{background:#0a1525;border-bottom:1px solid #1e293b;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.7rem;position:sticky;top:0;z-index:10}
  .header-title{cursor:pointer}
  .header-title h1{font-family:'Playfair Display',serif;font-size:1.2rem;color:#f1f5f9}
  .header-title p{color:#334155;font-size:.72rem;margin-top:2px}
  .nav-btns{display:flex;gap:.5rem}
  .nav-btn{background:transparent;border:1px solid #1e293b;color:#475569;padding:.38rem .85rem;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .2s}
  .nav-btn.active{background:#0f2a4a;border-color:#3b82f6;color:#60a5fa}
  .main{max-width:880px;margin:0 auto;padding:1.8rem 1.2rem}
  .section-title{font-family:'Playfair Display',serif;font-size:1.25rem;color:#f1f5f9;margin-bottom:.3rem}
  .section-sub{color:#334155;font-size:.8rem;margin-bottom:1.4rem}
  .topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:.8rem}
  .topic-card{background:#0d1626;border:1px solid #1e293b;border-radius:12px;padding:1rem;cursor:pointer;transition:all .2s}
  .topic-card:hover{transform:translateY(-3px);border-color:#3b82f6}
  .topic-emoji{font-size:1.6rem;margin-bottom:.35rem}
  .topic-name{color:#f1f5f9;font-size:.88rem;font-weight:700}
  .topic-meta{color:#334155;font-size:.73rem;margin-top:3px}
  /* Detail view */
  .back-btn{background:none;border:none;color:#475569;cursor:pointer;font-size:.8rem;margin-bottom:1.4rem;display:flex;align-items:center;gap:.3rem;transition:color .2s}
  .back-btn:hover{color:#fbbf24}
  .detail-header{display:flex;align-items:center;gap:.6rem;margin-bottom:1.6rem}
  .detail-emoji{font-size:1.9rem}
  .detail-title{font-family:'Playfair Display',serif;font-size:1.5rem;color:#f8fafc;padding-bottom:3px}
  .section-card{background:#0d1626;border:1px solid #1e293b;border-radius:14px;padding:1.3rem;margin-bottom:1rem}
  .section-heading{font-size:.93rem;font-weight:700;margin-bottom:.85rem}
  .section-content{color:#cbd5e1;line-height:1.8;margin-bottom:.9rem;font-size:.88rem;white-space:pre-line}
  .points-list{list-style:none;padding:0;margin-bottom:.9rem}
  .points-list li{color:#cbd5e1;font-size:.86rem;line-height:1.7;padding:.38rem 0;border-bottom:1px solid #1e293b;display:flex;gap:.5rem}
  .points-list li span.arrow{flex-shrink:0}
  .pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.9rem}
  .pros-label{color:#4ade80;font-size:.72rem;font-weight:700;margin-bottom:.45rem;letter-spacing:.05em}
  .cons-label{color:#f87171;font-size:.72rem;font-weight:700;margin-bottom:.45rem;letter-spacing:.05em}
  .pro-item{background:#031a0e;border:1px solid #14532d;border-radius:7px;padding:.4rem .65rem;margin-bottom:.3rem;color:#86efac;font-size:.78rem;line-height:1.5}
  .con-item{background:#1a0505;border:1px solid #7f1d1d;border-radius:7px;padding:.4rem .65rem;margin-bottom:.3rem;color:#fca5a5;font-size:.78rem;line-height:1.5}
  .memory-box{background:#130e00;border:1px solid #713f12;border-radius:9px;padding:.75rem .9rem;margin-top:.4rem}
  .memory-box p{color:#fcd34d;font-size:.82rem;line-height:1.6;margin:0}
  .nav-row{display:flex;justify-content:space-between;margin-top:1.3rem}
  .btn-prev{background:#0d1626;border:1px solid #1e293b;color:#475569;padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.8rem}
  .btn-next{border:none;color:#050a12;padding:.5rem 1.1rem;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:700}
  .btn-flash{background:#4f46e5;border:none;color:#fff;padding:.5rem 1.1rem;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:700}
  /* Flashcards */
  .flash-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1.2rem}
  .flash-title{font-family:'Playfair Display',serif;font-size:1.4rem;color:#f1f5f9}
  .flash-sub{color:#475569;font-size:.8rem;margin-top:3px}
  .flash-progress{color:#4ade80;font-size:.82rem;font-weight:700}
  .flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:.8rem}
  .flash-card{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:1rem;cursor:pointer;transition:all .25s;min-height:82px;display:flex;flex-direction:column;justify-content:space-between;gap:.6rem}
  .flash-card.flipped{background:#0d1e35;border-color:#3b82f6}
  .flash-card.done{background:#051a10;border-color:#166534}
  .flash-q{margin:0;font-size:.84rem;line-height:1.55;color:#e2e8f0;font-weight:600}
  .flash-a{margin:0;font-size:.84rem;line-height:1.55;color:#7dd3fc}
  .mark-btn{align-self:flex-end;background:#1e293b;border:1px solid #334155;color:#64748b;font-size:.72rem;padding:2px 8px;border-radius:6px;cursor:pointer;transition:all .2s}
  .mark-btn.done{background:#14532d;border-color:#4ade80;color:#4ade80}
  b.gold{color:#fbbf24}
  .hidden{display:none}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title" onclick="showHome()">
    <h1>📘 SE Module 2 Study Guide</h1>
    <p>Software Architecture · Coupling &amp; Cohesion | SJCET Palai</p>
  </div>
  <div class="nav-btns">
    <button class="nav-btn active" id="btn-topics" onclick="showHome()">📖 Topics</button>
    <button class="nav-btn" id="btn-flash" onclick="showFlash()">⚡ Flashcards</button>
  </div>
</div>

<div class="main">

  <!-- HOME: topic grid -->
  <div id="view-home">
    <div class="section-title">All Topics</div>
    <div class="section-sub">10 topics from both PDFs — click to study</div>
    <div class="topics-grid" id="topics-grid"></div>
  </div>

  <!-- DETAIL: topic detail -->
  <div id="view-detail" class="hidden">
    <button class="back-btn" onclick="showHome()">← All Topics</button>
    <div class="detail-header">
      <span class="detail-emoji" id="d-emoji"></span>
      <h2 class="detail-title" id="d-title"></h2>
    </div>
    <div id="d-sections"></div>
    <div class="nav-row" id="d-nav"></div>
  </div>

  <!-- FLASHCARDS -->
  <div id="view-flash" class="hidden">
    <div class="flash-header">
      <div>
        <div class="flash-title">⚡ Flashcards</div>
        <div class="flash-sub">Tap to reveal · Mark done to track progress</div>
      </div>
      <span class="flash-progress" id="flash-prog">0/14 done</span>
    </div>
    <div class="flash-grid" id="flash-grid"></div>
  </div>

</div>

<script>
const topics = [
  {
    id:1, emoji:"🏗️", title:"Software Architecture", color:"#e8a838",
    sections:[{
      heading:"What is Software Architecture?",
      content:"Software Architecture is the **high-level structure** of a software system — the set of rules, patterns, and guidelines that dictate how components are organized and interact.\n\nThink of it like the **blueprint of a building** — before any bricks are laid, the architect defines the structure.",
      memory:"🧠 Mnemonic: **MESSP** — Modularity, Encapsulation, Security, Documentation, Performance",
      points:[
        "**Modularity** – Divides system into independent, interchangeable components",
        "**Encapsulation** – Hides internal details; reduces complexity",
        "**Security** – Protects against unauthorized access",
        "**Documentation** – Provides clear system understanding",
        "**Performance** – Ensures throughput & resource utilization goals",
      ],
    }],
  },
  {
    id:2, emoji:"📚", title:"Layered Architecture", color:"#3b82f6",
    sections:[
      {
        heading:"What is it?",
        content:"Components separated into **stacked layers**, each with a unique task. Layers are independent — change one without affecting others.\n\nThe **most commonly used** pattern for software.",
        memory:"🧠 Top to bottom: **P-B-A-D** → Presentation → Business → Application → Data",
        points:[
          "**Presentation Layer** – What the user sees (UI)",
          "**Business Layer** – Executes business logic per request",
          "**Application Layer** – Bridges Presentation and Data",
          "**Data Layer** – Database; manages persistent data",
        ],
      },
      {
        heading:"Advantages & Disadvantages",
        pros:["Scalability – each layer scales independently","Flexibility – different technologies per layer","Maintainability – isolated changes"],
        cons:["Complexity – more layers = harder to manage","Performance Overhead – extra inter-layer communication","Strict separation can cause inefficiencies"],
      },
      {
        heading:"Use Cases",
        content:"CRM systems, E-commerce platforms, Financial desktop apps, Banking mobile apps, WordPress (CMS)",
        memory:"🧠 **C-E-F-B-W** → CRM, E-commerce, Finance, Banking, WordPress",
      },
    ],
  },
  {
    id:3, emoji:"🖥️", title:"Client-Server Architecture", color:"#10b981",
    sections:[
      {
        heading:"What is it?",
        content:"Two entities: **Server** (holds resources) + **multiple Clients** (request resources).\n\nFlow: Client sends request → Server processes → Server responds back.",
        memory:"🧠 Think **restaurant**: Clients = customers, Server = kitchen, Resources = food.",
        points:[
          "Server holds: data, files, or services",
          "Centralized resource & security management",
          "Clients request; server processes and responds",
        ],
      },
      {
        heading:"Advantages & Disadvantages",
        pros:["Centralized Management – easy security & backups","Scalability – servers can be scaled up","Security – access controls & data encryption"],
        cons:["Single Point of Failure – server dies, all clients lose access","Costly – hardware + software + admin expenses","Complexity – design and management is complex"],
      },
      {
        heading:"Use Cases",
        content:"Amazon, Gmail/Outlook, Dropbox/Google Drive, Netflix, Moodle",
        memory:"🧠 **A-G-D-N-M** → Amazon, Gmail, Dropbox, Netflix, Moodle",
      },
    ],
  },
  {
    id:4, emoji:"📡", title:"Publish-Subscribe (Pub-Sub)", color:"#8b5cf6",
    sections:[
      {
        heading:"What is it?",
        content:"Publisher and Subscriber are **completely decoupled** — they don't know each other. Communication via a **Message Broker / Event Bus**.\n\n• **Publisher** – Groups messages into topics/channels\n• **Subscriber** – Listens to topics of interest\n• **Broker** – Routes messages to the right subscribers",
        memory:"🧠 Think **YouTube**: Creator (Publisher) uploads once. YouTube (Broker) notifies all Subscribers. You don't need to keep checking.",
      },
      {
        heading:"Advantages",
        pros:[
          "Extreme Decoupling – publishers & subscribers can be in different languages/servers",
          "High Scalability – add thousands of subscribers without changing publisher code",
          "Improved Responsiveness – asynchronous; publisher fires and moves on",
          "Reliability – broker holds messages if subscriber is temporarily offline",
        ],
      },
      {
        heading:"Case Studies",
        content:"**Uber (GPS)**: Driver app (Publisher) → Broker → Rider's App + Analytics + Billing Service\n\n**Instagram/Twitter**: You post (Publisher) → Broker → all followers' feeds (Subscribers)",
        memory:"🧠 Publisher sends ONE message → Broker → multiple subscribers. No direct connection needed.",
      },
    ],
  },
  {
    id:5, emoji:"🗃️", title:"Repository Architecture", color:"#f43f5e",
    sections:[
      {
        heading:"What is it?",
        content:"Centers around a **central data store** shared by all independent components. Components don't talk to each other — only to the repository.\n\n**Active (Blackboard)**: Repo notifies components on data change (data-driven)\n**Passive**: Components must manually poll the repo (component-driven)",
        memory:"🧠 Think **whiteboard in class**: Everyone reads/writes the same board. Nobody whispers — they just check the board.",
      },
      {
        heading:"Advantages & Disadvantages",
        pros:["Data Integrity – single source of truth; no stale data","Low Coupling – components completely independent","Efficiency – no massive file passing between services"],
        cons:["Single Point of Failure – repo fails, entire system stops","Performance Bottleneck – concurrent access can slow things","Data Evolution – schema change forces updates to ALL components"],
      },
      {
        heading:"Case Studies",
        content:"**IDEs** (VS Code/Eclipse): Repo = Abstract Syntax Tree (AST). Components = Compiler, Debugger, Syntax Highlighter — all read same code tree, never talk to each other.\n\n**Banking**: Repo = Central Ledger. Components = ATM, Mobile App, Interest Calculator, Fraud Detection.",
      },
    ],
  },
  {
    id:6, emoji:"🔌", title:"Component & Connector (C&C)", color:"#f97316",
    sections:[
      {
        heading:"What is it?",
        content:"Describes **runtime behavior** — how the system executes and communicates (not how code sits on disk).\n\n• **Components** – Computational units that do work (web server, database, mobile client). Interact via **Ports**.\n• **Connectors** – Pathways between components (REST API, SQL, message bus). Attach via **Roles**.",
        memory:"🧠 Components = **electrical devices**. Connectors = **power cables**. Ports = **plug sockets** on the device.",
      },
      {
        heading:"Web App Case Study",
        content:"**Components**: Browser Client, Web Server (Node.js/Django), Database (PostgreSQL)\n\n**Connectors**:\n• HTTPS → Browser ↔ Web Server (synchronous request/response)\n• JDBC/ODBC → Web Server ↔ Database (SQL queries)",
        memory:"🧠 Port = socket ON the component. Connector = cable BETWEEN two ports.",
      },
    ],
  },
  {
    id:7, emoji:"⚙️", title:"Functional Independence", color:"#06b6d4",
    sections:[{
      heading:"What is it?",
      content:"Modules with **single-minded function** and minimal interaction with other modules.\n\nGoal: each module does ONE thing and knows as little as possible about others.\nMeasured by **Cohesion** (internal strength) and **Coupling** (external interdependence).",
      memory:"🧠 Think **specialist doctor**: A cardiologist only treats hearts. Doesn't fix bones or manage billing. That focused expertise = functional independence.",
      points:[
        "Easier to develop",
        "Easier to test and maintain",
        "Reduced error propagation",
        "Modules become reusable",
      ],
    }],
  },
  {
    id:8, emoji:"🔗", title:"Coupling (External)", color:"#dc2626",
    sections:[
      {
        heading:"What is Coupling?",
        content:"Measures **degree of interdependence between different modules**.\n\n**GOAL: Low Coupling** — modules should be as independent as possible.",
        memory:"🧠 Low coupling = **strangers** who nod politely. High coupling = **Siamese twins** — if one moves, both must move.",
      },
      {
        heading:"Levels: Best → Worst",
        points:[
          "**No Coupling (Best)** – Completely independent, no interaction",
          "**Data Coupling** – Communicate via simple parameters (pass an integer). ✅ Goal of good design.",
          "**Stamp Coupling** – Share a complex data structure but only use part of it",
          "**Control Coupling** – One module passes a 'flag' to control another's logic",
          "**Common/Global Coupling** – Share global variables. ⚠️ Change one, break others.",
          "**Content Coupling (Worst)** – One module directly modifies another's internals. ❌",
        ],
        memory:"🧠 Best → Worst: **No Data Stamps Control Common Content** (N-D-S-C-C-C)",
      },
    ],
  },
  {
    id:9, emoji:"🧩", title:"Cohesion (Internal)", color:"#16a34a",
    sections:[
      {
        heading:"What is Cohesion?",
        content:"Measures **how closely related the elements inside a single module are**.\n\n**GOAL: High Cohesion** — every function in the module truly belongs there.",
        memory:"🧠 High cohesion = **specialized toolbox** (only plumbing tools). Low cohesion = **junk drawer** (random stuff).",
      },
      {
        heading:"Levels: Best → Worst",
        points:[
          "**Functional (Best)** – Does exactly ONE thing (e.g., calculate_tax()). ✅",
          "**Sequential** – Output of one step is input to next (assembly line)",
          "**Communicational** – All functions operate on same input/output data",
          "**Procedural** – Grouped because they follow a specific sequence of execution",
          "**Temporal** – Grouped because they run at the same time (e.g., init())",
          "**Logical** – Grouped because they do logically similar things",
          "**Coincidental (Worst)** – Grouped randomly, no real relationship. ❌",
        ],
        memory:"🧠 Best → Worst: **F-S-C-P-T-L-C** → 'Functional Systems Communicate Properly; Temporal Logic is Coincidental'",
      },
    ],
  },
  {
    id:10, emoji:"🏆", title:"The Golden Rule", color:"#ca8a04",
    sections:[
      {
        heading:"High Cohesion + Low Coupling = Good Design",
        content:"This is the **fundamental principle** of high-quality software.\n\n**High Cohesion** → if a requirement changes, only ONE module needs updating.\n\n**Low Coupling** → a change in one module does NOT cause ripple-effect bugs across the system.",
        memory:"🧠 Good team: each player skilled at ONE role (cohesion). Teams work independently — changing one team's strategy doesn't force others to change (low coupling).",
      },
      {
        heading:"Quick Diagnosis Scenarios",
        points:[
          "❌ Math module has Add(), Subtract(), AND UpdateUI() → **Low Cohesion** — UI logic doesn't belong in Math",
          "❌ Login module directly changes variable inside Database module → **High Coupling** — DB changes will break Login",
          "✅ calculateTax(income) takes a number, returns a number → **High Cohesion + Low Coupling** — perfect module!",
        ],
      },
    ],
  },
];

const flashcards = [
  {q:"What is Software Architecture?", a:"High-level structure of a software system — rules, patterns & guidelines for how components are organized and interact."},
  {q:"Name the 4 layers in Layered Architecture (top to bottom)", a:"Presentation → Business → Application → Data (P-B-A-D)"},
  {q:"What connects Publisher & Subscriber in Pub-Sub?", a:"Message Broker / Event Bus — a third-party routing intermediary."},
  {q:"Active vs Passive Repository?", a:"Active (Blackboard): repo notifies components automatically. Passive: components must manually poll the repo."},
  {q:"What is a Port in C&C architecture?", a:"The interaction point ON a component — like a socket where a connector attaches."},
  {q:"What is a Connector in C&C?", a:"The interaction pathway between components (e.g., REST API, SQL connection, message bus)."},
  {q:"Best & worst Coupling types?", a:"Best: No Coupling (Data Coupling in practice ✅). Worst: Content Coupling ❌."},
  {q:"Best & worst Cohesion types?", a:"Best: Functional Cohesion ✅. Worst: Coincidental Cohesion ❌."},
  {q:"The Golden Rule of software design?", a:"HIGH Cohesion + LOW Coupling"},
  {q:"Biggest weakness of Repository Architecture?", a:"Single Point of Failure — if the central data store fails, the entire system stops."},
  {q:"Why does Pub-Sub scale better than Client-Server?", a:"Asynchronous & decoupled — no constant connections needed; broker holds messages; add subscribers without changing publisher code."},
  {q:"What does Functional Independence mean?", a:"Modules have a single-minded function and minimal interaction with other modules — measured by Cohesion & Coupling."},
  {q:"Control Coupling definition?", a:"One module passes a flag/control info to another to dictate its internal logic or execution path."},
  {q:"Temporal Cohesion definition?", a:"Elements grouped because they execute at the same time (e.g., an initialization function setting up unrelated variables)."},
];

// ---- Helpers ----
function parseBold(text){
  return text.replace(/\*\*([^*]+)\*\*/g,'<b class="gold">$1</b>');
}

// ---- Render topic grid ----
function renderHome(){
  const g = document.getElementById('topics-grid');
  g.innerHTML = topics.map(t=>`
    <div class="topic-card" style="border-left:4px solid ${t.color}" onclick="showDetail(${t.id})">
      <div class="topic-emoji">${t.emoji}</div>
      <div class="topic-name">${t.title}</div>
      <div class="topic-meta">${t.sections.length} section${t.sections.length>1?'s':''}</div>
    </div>
  `).join('');
}

// ---- Render detail ----
function showDetail(id){
  const t = topics.find(x=>x.id===id);
  document.getElementById('d-emoji').textContent = t.emoji;
  const titleEl = document.getElementById('d-title');
  titleEl.textContent = t.title;
  titleEl.style.borderBottom = `3px solid ${t.color}`;

  const secEl = document.getElementById('d-sections');
  secEl.innerHTML = t.sections.map(s=>{
    let html = `<div class="section-card">
      <div class="section-heading" style="color:${t.color}">${s.heading}</div>`;

    if(s.content) html += `<div class="section-content">${parseBold(s.content)}</div>`;

    if(s.points){
      html += `<ul class="points-list">`;
      s.points.forEach(p=>{
        html += `<li><span class="arrow" style="color:${t.color}">▸</span><span>${parseBold(p)}</span></li>`;
      });
      html += `</ul>`;
    }

    if(s.pros||s.cons){
      html += `<div class="pros-cons">`;
      if(s.pros){
        html += `<div><div class="pros-label">✅ ADVANTAGES</div>`;
        s.pros.forEach(p=>{ html += `<div class="pro-item">${parseBold(p)}</div>`; });
        html += `</div>`;
      }
      if(s.cons){
        html += `<div><div class="cons-label">❌ DISADVANTAGES</div>`;
        s.cons.forEach(c=>{ html += `<div class="con-item">${parseBold(c)}</div>`; });
        html += `</div>`;
      }
      html += `</div>`;
    }

    if(s.memory){
      html += `<div class="memory-box"><p>${parseBold(s.memory)}</p></div>`;
    }

    html += `</div>`;
    return html;
  }).join('');

  // Nav buttons
  const nav = document.getElementById('d-nav');
  let navHtml = '';
  if(t.id > 1){
    navHtml += `<button class="btn-prev" onclick="showDetail(${t.id-1})">← Prev</button>`;
  } else {
    navHtml += `<span></span>`;
  }
  if(t.id < topics.length){
    navHtml += `<button class="btn-next" style="background:${t.color}" onclick="showDetail(${t.id+1})">Next Topic →</button>`;
  } else {
    navHtml += `<button class="btn-flash" onclick="showFlash()">⚡ Test Yourself →</button>`;
  }
  nav.innerHTML = navHtml;

  setView('detail');
}

// ---- Flashcards ----
const flashState = {};
function updateProgress(){
  const done = Object.values(flashState).filter(v=>v.done).length;
  document.getElementById('flash-prog').textContent = `${done}/${flashcards.length} done`;
}

function renderFlash(){
  const g = document.getElementById('flash-grid');
  g.innerHTML = flashcards.map((c,i)=>`
    <div class="flash-card" id="fc-${i}" onclick="flipCard(${i})">
      <p class="flash-q" id="fq-${i}">❓ ${c.q}</p>
      <p class="flash-a hidden" id="fa-${i}">✅ ${c.a}</p>
      <button class="mark-btn hidden" id="fb-${i}" onclick="markDone(event,${i})">Mark done</button>
    </div>
  `).join('');
}

function flipCard(i){
  const card = document.getElementById(`fc-${i}`);
  const q = document.getElementById(`fq-${i}`);
  const a = document.getElementById(`fa-${i}`);
  const btn = document.getElementById(`fb-${i}`);
  const state = flashState[i] || {flipped:false, done:false};
  state.flipped = !state.flipped;
  flashState[i] = state;

  if(state.flipped){
    q.classList.add('hidden');
    a.classList.remove('hidden');
    btn.classList.remove('hidden');
    if(!state.done) card.classList.add('flipped');
  } else {
    q.classList.remove('hidden');
    a.classList.add('hidden');
    btn.classList.add('hidden');
    if(!state.done) card.classList.remove('flipped');
  }
}

function markDone(e, i){
  e.stopPropagation();
  const card = document.getElementById(`fc-${i}`);
  const btn = document.getElementById(`fb-${i}`);
  const state = flashState[i] || {flipped:true, done:false};
  state.done = !state.done;
  flashState[i] = state;

  if(state.done){
    card.classList.remove('flipped');
    card.classList.add('done');
    btn.classList.add('done');
    btn.textContent = '✓ Done';
  } else {
    card.classList.remove('done');
    card.classList.add('flipped');
    btn.classList.remove('done');
    btn.textContent = 'Mark done';
  }
  updateProgress();
}

// ---- View management ----
function setView(v){
  ['home','detail','flash'].forEach(n=>{
    document.getElementById(`view-${n}`).classList.toggle('hidden', n!==v);
  });
  document.getElementById('btn-topics').classList.toggle('active', v==='home'||v==='detail');
  document.getElementById('btn-flash').classList.toggle('active', v==='flash');
}

function showHome(){
  setView('home');
}

function showFlash(){
  setView('flash');
}

// ---- Init ----
renderHome();
renderFlash();
</script>
</body>
</html>
